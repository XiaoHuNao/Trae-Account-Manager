# Trae-Proxy 配置文件
# 代理域名配置
domain: api.openai.com

# 后端API配置列表
apis:
  - name: "vveai-gemini"
    endpoint: "https://api.vveai.com"
    custom_model_id: "gemini-3.1-flash-lite-preview"
    target_model_id: "gemini-3.1-flash-lite-preview"
    stream_mode: null
    active: true
  - name: "vveai-doubao"
    endpoint: "https://api.vveai.com"
    custom_model_id: "doubao-seed-1-8-251228"
    target_model_id: "doubao-seed-1-8-251228"
    stream_mode: null
    active: true
# 代理服务器配置
server:
  port: 443
  debug: true
